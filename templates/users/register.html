{% extends "base.html" %}

{% block title %}Регистрация | DEVHUB Форум{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden mt-10">
    <div class="px-8 py-10">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Создать аккаунт</h2>
        <p class="text-center text-slate-500 mb-8 text-sm">Присоединяйтесь к нашему сообществу разработчиков</p>

        <form action="" method="POST" class="flex flex-col gap-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Логин</label>
                <input type="text" name="username" placeholder="Придумайте логин" required 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-lg py-2.5 px-4 focus:outline-none focus:ring-2 focus:ring-brandBlue/50 transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" name="email" placeholder="ваш@email.com" required 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-lg py-2.5 px-4 focus:outline-none focus:ring-2 focus:ring-brandBlue/50 transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-lg py-2.5 px-4 focus:outline-none focus:ring-2 focus:ring-brandBlue/50 transition">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Повторите пароль</label>
                <input type="password" name="password_confirm" placeholder="••••••••" required 
                       class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-lg py-2.5 px-4 focus:outline-none focus:ring-2 focus:ring-brandBlue/50 transition">
            </div>

            <button type="submit" class="w-full bg-brandBlue hover:bg-blue-800 text-white font-semibold py-3 rounded-lg shadow-md transition mt-2">
                Зарегистрироваться
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-500">
            Уже есть аккаунт? <a href="{% url 'login' %}" class="text-brandBlue hover:underline font-semibold">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
